name: Quality Gates

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  actions: write
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root quality dependencies
        run: npm install

      - name: Lint checks (HTML/CSS/JS)
        run: npm run lint

      - name: Formatting checks
        run: npm run format:check

      - name: Link checks
        run: npm run linkcheck

      - name: Lighthouse performance/a11y budgets
        run: npm run lighthouse:ci

  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install Playwright test dependencies
        run: npm --prefix tests ci

      - name: Install system dependencies for Playwright browsers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libgtk-4-0 \
            libglib2.0-0 \
            libcairo2 \
            libnss3 libnspr4 \
            libx11-6 libxrandr2 libxcomposite1 libxdamage1 libxext6 libxfixes3 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxrender1 \
            fonts-noto-color-emoji \
            xdg-utils \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 \
            libharfbuzz-icu0 \
            libwayland-client0 libwayland-server0 \
            libmanette-0.2-0 \
            libflite1 \
            libavif16 \
            libc6 libgcc-s1 libstdc++6

      - name: Install Playwright browsers
        run: npm --prefix tests exec playwright install chromium webkit

      - name: Run full Playwright suite (includes accessibility assertions)
        run: npm --prefix tests test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 30
